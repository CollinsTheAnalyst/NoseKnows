{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block content %}
<div class="container-fluid" style="padding: 2rem; background: #f1f5f9; min-height: 100vh;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="font-weight: 700; color: #1c2434;">eCommerce Analytics</h2>
        <div class="text-muted">{{ now|date:"M d, Y" }}</div>
    </div>

    <div class="row mb-4">
        <div class="col-md-3">
            <div class="stat-card" style="background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
                <p class="text-muted small mb-1">TOTAL SALES</p>
                <h3 style="font-weight: 800;">{{ total_sales }}</h3>
            </div>
        </div>
        </div>

    <div class="row mb-4">
        <div class="col-md-8">
            <div class="card p-4" style="border-radius: 12px; border:none;">
                <h5>Monthly Sales</h5>
                <canvas id="monthlySalesChart" height="100"></canvas>
            </div>
        </div>
        <div class="col-md-4">
             <div class="card p-4" style="border-radius: 12px; border:none;">
                <h5>Monthly Target</h5>
                </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Logic for Monthly Sales Bar Chart
    const ctx = document.getElementById('monthlySalesChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'],
            datasets: [{
                label: 'Sales',
                data: [12, 19, 13, 17, 21, 24, 18],
                backgroundColor: '#3c50e0',
                borderRadius: 5
            }]
        }
    });
</script>
{% endblock %}
